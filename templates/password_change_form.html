{{define "password_change_form.html"}}
{{template "header" .}}

<div class="topbar">
  <div class="topbar-title">Смена пароля</div>
</div>

<div class="content-area">
  <div class="card" style="max-width:420px;padding:24px;">
    {{if .Error}}
    <div style="margin-bottom:16px;padding:10px 12px;background:var(--red-subtle);border:1px solid oklch(0.85 0.06 25);border-radius:var(--radius-sm);font-size:12.5px;color:var(--red);">{{.Error}}</div>
    {{end}}

    <form method="POST" action="/accounts/password_change/">
      <div class="form-group">
        <label class="form-label" for="old_password">Текущий пароль</label>
        <input class="form-input" type="password" id="old_password" name="old_password" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="new_password">Новый пароль</label>
        <input class="form-input" type="password" id="new_password" name="new_password" required>
      </div>

      <div style="display:flex;gap:8px;margin-top:20px;">
        <button type="submit" class="btn btn-primary">Сменить пароль</button>
        <a href="/accounts/info/" class="btn btn-ghost">Отмена</a>
      </div>
    </form>
  </div>
</div>

{{template "footer" .}}
{{end}}
