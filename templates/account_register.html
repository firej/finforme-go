{{define "account_register.html"}}
{{template "header" .}}

<div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - var(--topbar-h));padding:20px;">
  <div style="width:100%;max-width:380px;">
    <div class="card" style="padding:28px;">
      <h2 style="font-size:18px;font-weight:600;margin-bottom:20px;">Регистрация</h2>

      {{if .Error}}
      <div style="margin-bottom:16px;padding:10px 12px;background:var(--red-subtle);border:1px solid oklch(0.85 0.06 25);border-radius:var(--radius-sm);font-size:12.5px;color:var(--red);">{{.Error}}</div>
      {{end}}

      <form method="POST" action="/accounts/register/">
        <div class="form-group">
          <label class="form-label" for="username">Логин <span style="color:var(--red)">*</span></label>
          <input class="form-input" type="text" id="username" name="username" required autocomplete="username">
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email <span style="color:var(--red)">*</span></label>
          <input class="form-input" type="email" id="email" name="email" required autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Пароль <span style="color:var(--red)">*</span></label>
          <input class="form-input" type="password" id="password" name="password" required autocomplete="new-password">
        </div>

        <div class="form-group">
          <label class="form-label" for="firstname">Имя</label>
          <input class="form-input" type="text" id="firstname" name="firstname" autocomplete="given-name">
        </div>

        <div class="form-group">
          <label class="form-label" for="lastname">Фамилия</label>
          <input class="form-input" type="text" id="lastname" name="lastname" autocomplete="family-name">
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:20px;">
          <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
          <a href="/accounts/login/" style="font-size:12.5px;color:var(--accent-text);text-decoration:none;">Уже есть аккаунт?</a>
        </div>
      </form>
    </div>
  </div>
</div>

{{template "footer" .}}
{{end}}
