{{define "change_info_form.html"}}
{{template "header" .}}

<div class="flex justify-center py-8">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-6">Изменение информации</h2>

            {{if .Error}}
            <div class="mb-4 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">{{.Error}}</div>
            {{end}}

            <form method="POST" action="/accounts/change_info/">
                <div class="mb-4">
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="email" name="email"
                           value="{{if .User}}{{.User.Email}}{{end}}" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors">
                </div>

                <div class="mb-4">
                    <label for="first_name" class="block text-sm font-medium text-gray-700 mb-1">Имя</label>
                    <input type="text" id="first_name" name="first_name"
                           value="{{if .User}}{{.User.FirstName}}{{end}}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors">
                </div>

                <div class="mb-6">
                    <label for="last_name" class="block text-sm font-medium text-gray-700 mb-1">Фамилия</label>
                    <input type="text" id="last_name" name="last_name"
                           value="{{if .User}}{{.User.LastName}}{{end}}"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors">
                </div>

                <div class="flex gap-3">
                    <button type="submit" class="px-5 py-2.5 bg-primary-600 text-white font-medium rounded-lg shadow hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition-colors">
                        Сохранить
                    </button>
                    <a href="/accounts/info/" class="px-5 py-2.5 bg-gray-200 text-gray-700 font-medium rounded-lg hover:bg-gray-300 transition-colors">
                        Отмена
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

{{template "footer" .}}
{{end}}
