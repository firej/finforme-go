{{define "change_info_form.html"}}
{{template "header" .}}

<div class="topbar">
  <div class="topbar-title">Изменение информации</div>
</div>


  <div class="card" style="max-width:420px;padding:24px;">
    {{if .Error}}
    <div style="margin-bottom:16px;padding:10px 12px;background:var(--red-subtle);border:1px solid oklch(0.85 0.06 25);border-radius:var(--radius-sm);font-size:12.5px;color:var(--red);">{{.Error}}</div>
    {{end}}

    <form method="POST" action="/accounts/change_info/">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" name="email"
               value="{{if .User}}{{.User.Email}}{{end}}" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="first_name">Имя</label>
        <input class="form-input" type="text" id="first_name" name="first_name"
               value="{{if .User}}{{.User.FirstName}}{{end}}">
      </div>

      <div class="form-group">
        <label class="form-label" for="last_name">Фамилия</label>
        <input class="form-input" type="text" id="last_name" name="last_name"
               value="{{if .User}}{{.User.LastName}}{{end}}">
      </div>

      <div style="display:flex;gap:8px;margin-top:20px;">
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="/accounts/info/" class="btn btn-ghost">Отмена</a>
      </div>
    </form>
  </div>
</div>

{{template "footer" .}}
{{end}}
