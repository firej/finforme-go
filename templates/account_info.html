{{define "account_info.html"}}
{{template "header" .}}

<div class="topbar">
  <div class="topbar-title">Аккаунт</div>
  <div class="topbar-actions">
    <a href="/accounts/change_info/" class="btn btn-ghost btn-sm">Изменить</a>
    <a href="/accounts/password_change/" class="btn btn-ghost btn-sm">Сменить пароль</a>
  </div>
</div>

<div class="content-area">
  <div class="card" style="max-width:480px;overflow:hidden;">
    <table style="width:100%;border-collapse:collapse;">
      <tbody>
        <tr style="border-bottom:1px solid var(--border-light);">
          <td style="padding:12px 16px;font-size:12px;color:var(--text-muted);width:120px;">Логин</td>
          <td style="padding:12px 16px;font-size:13px;font-weight:500;">{{.User.Username}}</td>
        </tr>
        <tr style="border-bottom:1px solid var(--border-light);">
          <td style="padding:12px 16px;font-size:12px;color:var(--text-muted);">Email</td>
          <td style="padding:12px 16px;font-size:13px;">{{.User.Email}}</td>
        </tr>
        <tr style="border-bottom:1px solid var(--border-light);">
          <td style="padding:12px 16px;font-size:12px;color:var(--text-muted);">Имя</td>
          <td style="padding:12px 16px;font-size:13px;">{{.User.FirstName}}</td>
        </tr>
        <tr>
          <td style="padding:12px 16px;font-size:12px;color:var(--text-muted);">Фамилия</td>
          <td style="padding:12px 16px;font-size:13px;">{{.User.LastName}}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

{{template "footer" .}}
{{end}}
