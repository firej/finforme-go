{{define "account_info.html"}}
{{template "header" .}}

<div class="max-w-2xl">
    <h2 class="text-2xl font-bold text-gray-900 mb-6">Информация об аккаунте</h2>

    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <table class="w-full">
            <tbody class="divide-y divide-gray-100">
                <tr>
                    <td class="px-6 py-4 text-sm font-medium text-gray-500 w-1/3">Логин</td>
                    <td class="px-6 py-4 text-sm text-gray-900">{{.User.Username}}</td>
                </tr>
                <tr>
                    <td class="px-6 py-4 text-sm font-medium text-gray-500">Email</td>
                    <td class="px-6 py-4 text-sm text-gray-900">{{.User.Email}}</td>
                </tr>
                <tr>
                    <td class="px-6 py-4 text-sm font-medium text-gray-500">Имя</td>
                    <td class="px-6 py-4 text-sm text-gray-900">{{.User.FirstName}}</td>
                </tr>
                <tr>
                    <td class="px-6 py-4 text-sm font-medium text-gray-500">Фамилия</td>
                    <td class="px-6 py-4 text-sm text-gray-900">{{.User.LastName}}</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-6 flex gap-3">
        <a href="/accounts/change_info/" class="px-4 py-2 bg-primary-600 text-white font-medium rounded-lg shadow hover:bg-primary-700 transition-colors text-sm">
            Изменить информацию
        </a>
        <a href="/accounts/password_change/" class="px-4 py-2 bg-gray-200 text-gray-700 font-medium rounded-lg hover:bg-gray-300 transition-colors text-sm">
            Сменить пароль
        </a>
    </div>
</div>

{{template "footer" .}}
{{end}}
