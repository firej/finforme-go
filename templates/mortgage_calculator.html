{{define "mortgage_calculator.html"}}
{{template "header" .}}

<div class="topbar">
  <div class="topbar-title">Ипотечный калькулятор</div>
</div>


  <div style="display:grid;grid-template-columns:320px 1fr;gap:16px;max-width:900px;">

    <!-- Параметры -->
    <div class="card" style="padding:20px;align-self:start;position:sticky;top:20px;">
      <div style="font-size:13px;font-weight:600;margin-bottom:16px;">Параметры ипотеки</div>

      <div class="form-group">
        <label class="form-label" for="propertyPrice">Стоимость недвижимости</label>
        <div style="position:relative;">
          <input class="form-input form-input-mono" type="text" id="propertyPrice" value="5 000 000"
                 oninput="formatNumberInput(this); calculate()">
          <span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text-muted);">₽</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="downPayment">Первоначальный взнос</label>
        <div style="position:relative;">
          <input class="form-input form-input-mono" type="text" id="downPayment" value="1 000 000"
                 oninput="formatNumberInput(this); updateDownPaymentPercent(); calculate()">
          <span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text-muted);">₽</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
          <input type="range" id="downPaymentRange" min="0" max="90" value="20"
                 style="flex:1;accent-color:var(--accent);"
                 oninput="updateDownPaymentFromRange(); calculate()">
          <span id="downPaymentPercent" style="font-size:12px;color:var(--text-muted);width:32px;text-align:right;">20%</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="interestRate">Процентная ставка (годовая)</label>
        <div style="position:relative;">
          <input class="form-input form-input-mono" type="text" id="interestRate" value="18"
                 oninput="calculate()">
          <span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text-muted);">%</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="loanTerm">Срок кредита</label>
        <div style="position:relative;">
          <input class="form-input form-input-mono" type="number" id="loanTerm" value="20" min="1" max="30"
                 oninput="calculate()">
          <span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--text-muted);">лет</span>
        </div>
        <input type="range" id="loanTermRange" min="1" max="30" value="20"
               style="margin-top:6px;width:100%;accent-color:var(--accent);"
               oninput="document.getElementById('loanTerm').value=this.value; calculate()">
      </div>

      <div class="form-group">
        <label class="form-label">Тип платежа</label>
        <div style="display:flex;background:var(--bg-app);border-radius:var(--radius-sm);padding:2px;gap:2px;">
          <button id="btnAnnuity" onclick="setPaymentType('annuity')"
                  style="flex:1;padding:6px 10px;font-size:12px;font-weight:500;border:none;cursor:pointer;border-radius:4px;background:var(--accent);color:white;transition:all 0.1s;">
            Аннуитетный
          </button>
          <button id="btnDifferentiated" onclick="setPaymentType('differentiated')"
                  style="flex:1;padding:6px 10px;font-size:12px;font-weight:500;border:none;cursor:pointer;border-radius:4px;background:none;color:var(--text-secondary);transition:all 0.1s;">
            Дифференцированный
          </button>
        </div>
      </div>
    </div>

    <!-- Результаты -->
    <div>
      <div class="card" style="padding:20px;">
        <div style="font-size:13px;font-weight:600;margin-bottom:16px;">Результаты расчёта</div>

        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;">
          <div style="background:var(--accent-subtle);border-radius:var(--radius-sm);padding:12px;">
            <div style="font-size:11px;color:var(--accent-text);font-weight:500;margin-bottom:3px;">Ежемесячный платёж</div>
            <div id="monthlyPayment" style="font-size:18px;font-weight:700;font-family:var(--font-mono);">—</div>
          </div>
          <div style="background:var(--bg-app);border-radius:var(--radius-sm);padding:12px;">
            <div style="font-size:11px;color:var(--text-muted);font-weight:500;margin-bottom:3px;">Сумма кредита</div>
            <div id="loanAmount" style="font-size:18px;font-weight:700;font-family:var(--font-mono);">—</div>
          </div>
          <div style="background:var(--red-subtle);border-radius:var(--radius-sm);padding:12px;">
            <div style="font-size:11px;color:var(--red);font-weight:500;margin-bottom:3px;">Переплата</div>
            <div id="totalInterest" style="font-size:18px;font-weight:700;font-family:var(--font-mono);">—</div>
          </div>
          <div style="background:var(--bg-app);border-radius:var(--radius-sm);padding:12px;">
            <div style="font-size:11px;color:var(--text-muted);font-weight:500;margin-bottom:3px;">Общая выплата</div>
            <div id="totalPayment" style="font-size:18px;font-weight:700;font-family:var(--font-mono);">—</div>
          </div>
        </div>

        <!-- Диаграмма -->
        <div style="height:8px;border-radius:99px;overflow:hidden;background:var(--border);display:flex;">
          <div id="barLoan" style="background:var(--accent);transition:width 0.3s;width:50%;"></div>
          <div id="barInterest" style="background:var(--red);transition:width 0.3s;width:50%;"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:5px;font-size:11.5px;color:var(--text-muted);">
          <span>Тело кредита: <span id="loanPercent">50%</span></span>
          <span>Проценты: <span id="interestPercent">50%</span></span>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="/static/mortgage.js"></script>

{{template "footer" .}}
{{end}}
