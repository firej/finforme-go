{{define "login.html"}}
{{template "header" .}}

<div style="display:flex;align-items:center;justify-content:center;min-height:calc(100vh - var(--topbar-h));padding:20px;">
  <div style="width:100%;max-width:380px;">
    <div class="card" style="padding:28px;">
      <h2 style="font-size:18px;font-weight:600;margin-bottom:20px;">Вход в систему</h2>

      {{if .Error}}
      <div style="margin-bottom:16px;padding:10px 12px;background:var(--red-subtle);border:1px solid oklch(0.85 0.06 25);border-radius:var(--radius-sm);font-size:12.5px;color:var(--red);">{{.Error}}</div>
      {{end}}

      <form method="POST" action="/accounts/login/">
        <input type="hidden" name="next" value="{{.Next}}">

        <div class="form-group">
          <label class="form-label" for="username">Логин</label>
          <input class="form-input" type="text" id="username" name="username" required autocomplete="username">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Пароль</label>
          <input class="form-input" type="password" id="password" name="password" required autocomplete="current-password">
        </div>

        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:20px;">
          <button type="submit" class="btn btn-primary">Войти</button>
          <a href="/accounts/register/" style="font-size:12.5px;color:var(--accent-text);text-decoration:none;">Регистрация</a>
        </div>
      </form>

      <div style="display:flex;align-items:center;gap:10px;margin:20px 0 14px;color:var(--text-muted);font-size:11px;">
        <div style="flex:1;height:1px;background:var(--border);"></div>
        <span>или</span>
        <div style="flex:1;height:1px;background:var(--border);"></div>
      </div>

      <form method="POST" action="/accounts/login-demo/">
        <button type="submit" class="btn btn-ghost" style="width:100%;justify-content:center;">
          Войти как демо
        </button>
        <p style="margin-top:8px;font-size:11.5px;color:var(--text-muted);text-align:center;">
          Готовый набор счетов и транзакций. Запись отключена.
        </p>
      </form>
    </div>
  </div>
</div>

{{template "footer" .}}
{{end}}
