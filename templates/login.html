{{define "login.html"}}
{{template "header" .}}

<div class="flex justify-center py-8">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
            <h2 class="text-2xl font-bold text-gray-900 mb-6">Вход в систему</h2>

            {{if .Error}}
            <div class="mb-4 p-4 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">{{.Error}}</div>
            {{end}}

            <form method="POST" action="/accounts/login/">
                <input type="hidden" name="next" value="{{.Next}}">

                <div class="mb-4">
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Логин</label>
                    <input type="text" id="username" name="username" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors">
                </div>

                <div class="mb-6">
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
                    <input type="password" id="password" name="password" required
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-colors">
                </div>

                <div class="flex items-center justify-between">
                    <button type="submit" class="px-5 py-2.5 bg-primary-600 text-white font-medium rounded-lg shadow hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 transition-colors">
                        Войти
                    </button>
                    <a href="/accounts/register/" class="text-sm text-primary-600 hover:text-primary-700 font-medium">Регистрация</a>
                </div>
            </form>
        </div>
    </div>
</div>

{{template "footer" .}}
{{end}}
