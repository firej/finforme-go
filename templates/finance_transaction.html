{{define "finance_transaction.html"}}
{{template "header" .}}

<div class="topbar">
  <div class="topbar-title">{{if .Transaction}}Редактирование транзакции{{else}}Новая транзакция{{end}}</div>
</div>

<div class="content-area">
  <div class="card" style="max-width:480px;padding:24px;">
    <form method="POST" hx-post="/api/v1/finance/transaction/save" hx-target="#result">
      {{if .Transaction}}
      <input type="hidden" name="id" value="{{.Transaction.ID}}">
      {{end}}

      <div class="form-group">
        <label class="form-label" for="description">Описание</label>
        <input class="form-input" type="text" id="description" name="description"
               value="{{if .Transaction}}{{.Transaction.Description}}{{end}}" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="post_date">Дата</label>
        <input class="form-input" type="date" id="post_date" name="post_date"
               value="{{if .Transaction}}{{.Transaction.PostDate.Format "2006-01-02"}}{{end}}" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="tags">Теги (через запятую)</label>
        <input class="form-input" type="text" id="tags" name="tags"
               value="{{if .Transaction}}{{.Transaction.Tags}}{{end}}">
      </div>

      <div class="form-group">
        <label class="form-label" for="value">Сумма</label>
        <input class="form-input form-input-mono" type="number" step="0.01" id="value" name="value"
               value="{{if .Debit}}{{with index .Debit 0}}{{.value}}{{end}}{{end}}" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="debit_account">Счёт зачисления</label>
        <select class="form-select" id="debit_account" name="debit_account" required>
          {{$debitAccountID := 0}}
          {{if .Debit}}{{with index .Debit 0}}{{$debitAccountID = .account_id}}{{end}}{{end}}
          {{range .Accounts}}
          <option value="{{.ID}}" {{if eq .ID $debitAccountID}}selected{{end}}>{{.DisplayName}}</option>
          {{end}}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="credit_account">Счёт списания</label>
        <select class="form-select" id="credit_account" name="credit_account" required>
          {{$creditAccountID := 0}}
          {{if .Credit}}{{with index .Credit 0}}{{$creditAccountID = .account_id}}{{end}}{{end}}
          {{range .Accounts}}
          <option value="{{.ID}}" {{if eq .ID $creditAccountID}}selected{{end}}>{{.DisplayName}}</option>
          {{end}}
        </select>
      </div>

      <div style="display:flex;gap:8px;margin-top:20px;">
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="/finance/account/{{.AccountID}}" class="btn btn-ghost">Отмена</a>
      </div>
    </form>

    <div id="result" style="margin-top:16px;"></div>

    <script>
    document.body.addEventListener('htmx:afterRequest', function(evt) {
      if (evt.detail.successful) {
        try {
          var r = JSON.parse(evt.detail.xhr.responseText);
          if (r.result === 'ok') { window.location.href = '/finance/account/{{.AccountID}}'; }
          else if (r.error) {
            document.getElementById('result').innerHTML =
              '<div style="padding:10px 12px;background:var(--red-subtle);border-radius:var(--radius-sm);font-size:12.5px;color:var(--red);">Ошибка: ' + r.error + '</div>';
          }
        } catch(e) {}
      }
    });
    </script>
  </div>
</div>

{{template "footer" .}}
{{end}}
