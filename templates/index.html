{{define "index.html"}}
{{template "header" .}}

<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;text-align:center;padding:20px;">
  <h1 style="font-size:28px;font-weight:700;margin-bottom:8px;letter-spacing:-0.5px;">Добро пожаловать в finfor.me</h1>
  <p style="font-size:15px;color:var(--text-secondary);margin-bottom:28px;">Система учёта личных финансов</p>

  {{if .Authenticated}}
  <a href="/finance/" class="btn btn-primary" style="font-size:14px;padding:10px 24px;">Перейти к финансам</a>
  {{else}}
  <p style="font-size:13px;color:var(--text-secondary);margin-bottom:16px;">Для начала работы войдите в систему или зарегистрируйтесь.</p>
  <div style="display:flex;gap:10px;">
    <a href="/accounts/login/" class="btn btn-primary">Вход</a>
    <a href="/accounts/register/" class="btn btn-ghost">Регистрация</a>
  </div>
  {{end}}
</div>

{{template "footer" .}}
{{end}}
