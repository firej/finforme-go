{{define "finance_account_drawer_form.html"}}
{{/*
  Рендерится внутри drawer-а account-drawer в main.html.
  Вызывается через /api/v1/finance/account/form?account_id=N
*/}}
<form id="drawer-account-form" onsubmit="return submitAccountForm(event)">
  {{if .Account}}
  <input type="hidden" name="id" value="{{.Account.ID}}">
  {{end}}

  <!-- Name -->
  <div class="form-group">
    <label class="form-label" for="modal-account_name">Название счёта <span style="color:var(--red)">*</span></label>
    <input class="form-input" type="text" id="modal-account_name" name="account_name"
           autofocus required placeholder="Например: Tinkoff Black"
           value="{{if .Account}}{{.Account.Name}}{{end}}">
  </div>

  <!-- Description -->
  <div class="form-group">
    <label class="form-label" for="modal-account_description">Описание</label>
    <input class="form-input" type="text" id="modal-account_description" name="account_description"
           placeholder="Необязательное описание"
           value="{{if .Account}}{{.Account.Description}}{{end}}">
  </div>

  <!-- Type + Currency -->
  <div class="form-row">
    <div class="form-group">
      <label class="form-label" for="modal-account_type">Тип <span style="color:var(--red)">*</span></label>
      <select class="form-select" id="modal-account_type" name="account_type" required>
        <option value="ASSET"     {{if .Account}}{{if eq .Account.AccountType "ASSET"}}selected{{end}}{{end}}>Актив</option>
        <option value="CASH"      {{if .Account}}{{if eq .Account.AccountType "CASH"}}selected{{end}}{{end}}>Наличные</option>
        <option value="BANK"      {{if .Account}}{{if eq .Account.AccountType "BANK"}}selected{{end}}{{end}}>Банк</option>
        <option value="LIABILITY" {{if .Account}}{{if eq .Account.AccountType "LIABILITY"}}selected{{end}}{{end}}>Обязательства</option>
        <option value="INCOME"    {{if .Account}}{{if eq .Account.AccountType "INCOME"}}selected{{end}}{{end}}>Доход</option>
        <option value="EXPENSE"   {{if .Account}}{{if eq .Account.AccountType "EXPENSE"}}selected{{end}}{{end}}>Расход</option>
        <option value="EQUITY"    {{if .Account}}{{if eq .Account.AccountType "EQUITY"}}selected{{end}}{{end}}>Капитал</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label" for="modal-commodity_id">Валюта <span style="color:var(--red)">*</span></label>
      <select class="form-select" id="modal-commodity_id" name="commodity_id" required>
        {{if .Commodities}}
          {{range .Commodities}}
          <option value="{{.ID}}" {{if $.Account}}{{if eq $.Account.CommodityID .ID}}selected{{end}}{{end}}>
            {{.Fullname}} ({{.Sign}})
          </option>
          {{end}}
        {{else}}
          <option value="">Нет доступных валют</option>
        {{end}}
      </select>
    </div>
  </div>

  <!-- Parent account: только контейнерные (placeholder) счета и не сам счёт -->
  <div class="form-group">
    <label class="form-label" for="modal-account_parent">Родительский счёт</label>
    <select class="form-select" id="modal-account_parent" name="account_parent">
      <option value="">— корневой —</option>
      {{range .Accounts}}
      {{if ne .AccountType "ROOT"}}{{if eq .Placeholder 1}}{{if or (not $.Account) (ne .ID $.Account.ID)}}
      <option value="{{.ID}}"
        {{if $.Account}}{{if $.Account.ParentID}}{{if eq .ID (derefInt64 $.Account.ParentID)}}selected{{end}}{{end}}{{end}}>
        {{.DisplayName}}
      </option>
      {{end}}{{end}}{{end}}
      {{end}}
    </select>
    <p class="form-hint">Можно выбрать только контейнерные счета.</p>
  </div>

  <!-- Placeholder flag -->
  <div class="form-group">
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;">
      <input type="checkbox" name="placeholder" value="1" {{if .Account}}{{if eq .Account.Placeholder 1}}checked{{end}}{{end}}>
      <span>Контейнерный счёт</span>
      <span class="form-hint" style="margin:0;">— используется только как группировка, без транзакций</span>
    </label>
  </div>

  <!-- Hidden flag -->
  {{if .Account}}
  <div class="form-group">
    <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;">
      <input type="checkbox" name="hidden" value="1" {{if eq .Account.Hidden 1}}checked{{end}}>
      <span>Скрыть счёт</span>
      <span class="form-hint" style="margin:0;">— не показывать в списках по умолчанию</span>
    </label>
  </div>
  {{end}}

  <div id="drawer-account-result"></div>

  <div style="display:flex;gap:8px;margin-top:4px;">
    <button type="submit" id="drawer-account-submit-btn" class="btn btn-primary">Сохранить</button>
    <button type="button" class="btn btn-ghost" onclick="closeAccountDrawer()">Отмена</button>
  </div>
</form>
{{end}}
