name: Deploy to finfor.me

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H finfor.me >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          # Синхронизация исходников
          rsync -avz --delete -e "ssh -i ~/.ssh/deploy_key" \
            --exclude='.git' \
            --exclude='bin' \
            --exclude='*.db' \
            --exclude='*.gnucash' \
            --exclude='.idea' \
            --exclude='.vscode' \
            --exclude='docker-compose.yml' \
            --exclude='docker-compose.prod.yml' \
            . firej@finfor.me:/opt/finforme/

          # Сборка и перезапуск на сервере
          ssh -i ~/.ssh/deploy_key firej@finfor.me '
            cd /opt/finforme && \
            docker build -t finforme:latest . && \
            cd /opt/traefik && \
            docker compose up -d --force-recreate finforme
          '

      - name: Health check
        run: |
          echo "Waiting for service to start..."
          sleep 5
          for i in 1 2 3 4 5; do
            if curl -sf https://finfor.me/ > /dev/null; then
              echo "✅ Deploy successful!"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 3s..."
            sleep 3
          done
          echo "❌ Health check failed"
          exit 1

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
